    function attachLoginEvents() {
        const loginBtn = document.getElementById('loginBtn');
        const createBtn = document.getElementById('createUserBtn');
        const userInp = document.getElementById('loginUsername');
        const passInp = document.getElementById('loginPassword');
        const feedDiv = document.getElementById('loginFeedback');

        const doLogin = () => {
            const u = userInp?.value.trim() || '';
            const p = passInp?.value || '';
            if (App.users[u] && App.users[u] === p) {
                App.loggedIn = true;
                App.currentUser = u;
                App.activeMainTab = "dashboard";
                App.checklistIds = null;
                App.xmlFiles = [];
                render();
            } else {
                if(feedDiv) feedDiv.innerHTML = '<span style="color:#D9534F;"><i class="fas fa-exclamation-triangle"></i> Invalid credentials</span>';
            }
        };
        const doCreate = () => {
            const u = userInp?.value.trim() || '';
            const p = passInp?.value || '';
            if (!u || !p) {
                if(feedDiv) feedDiv.innerHTML = '<span style="color:#E67E22;">Fill both fields</span>';
                return;

            if (App.users[u]) {

            } else {
                App.users[u] = p;
                if(feedDiv) feedDiv.innerHTML = '<span style="color:#2C7A47;"><i class="fas fa-check"></i> User created! Login now.</span>';
                if(userInp) userInp.value = '';
                if(passInp) passInp.value = '';
            }
        };
        if(loginBtn) loginBtn.addEventListener('click', doLogin);
        if(createBtn) createBtn.addEventListener('click', doCreate);
        const enterHandler = (e) => { if(e.key === 'Enter') doLogin(); };
        if(userInp) userInp.addEventListener('keypress', enterHandler);
        if(passInp) passInp.addEventListener('keypress', enterHandler);

    // ---- helpers for excel and XML ----
    let SheetJSPromise = null;
    function loadSheetJSLib() {
        return new Promise((resolve) => {
            if (window.XLSX) return resolve();
            const script = document.createElement('script');
            script.src = 'https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
            script.onload = () => resolve();
            document.head.appendChild(script);
        });
    }

    async function parseExcelToSet(file) {
        await loadSheetJSLib();
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                if (!rows.length) reject(new Error("Empty data"));
                let idKey = Object.keys(rows[0]).find(k => k.toLowerCase() === 'id') || Object.keys(rows[0])[0];
                const ids = new Set();
                for (let row of rows) {
                    let val = row[idKey];
                    if (val !== undefined && val !== null) ids.add(String(val).trim().toUpperCase());
                }
                if (ids.size === 0) reject(new Error("No IDs found"));
                resolve(ids);
            };
            reader.onerror = () => reject(new Error("File read error"));
            reader.readAsArrayBuffer(file);
        });
    }

    function extractIdsFromXml(fileContent, fileName) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(fileContent, "text/xml");
        const parseErr = doc.querySelector("parsererror");
        if (parseErr) throw new Error(`Invalid XML: ${fileName}`);
        const elements = doc.getElementsByTagName("*");
        let ids = [];
        for (let el of elements) {
            if (el.tagName.toLowerCase().includes('id') && el.textContent) {
                const txt = el.textContent.trim().toUpperCase();
                if (txt) ids.push(txt);
            }
        }
        return [...new Set(ids)];
    }

    async function processXmlFiles(files) {
        const results = [];
        for (let f of files) {
            try {
                const text = await f.text();
                const ids = extractIdsFromXml(text, f.name);
                results.push({ name: f.name, ids });
            } catch(e) { console.warn(e); }
        }
        return results;
    }

    // ---- attach events dashboard ----
    function attachMainEvents() {
        // navigation tabs
        const navBtns = document.querySelectorAll('.nav-item');
        navBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tab = btn.getAttribute('data-nav');
                if (tab === 'dashboard') App.activeMainTab = 'dashboard';
                else if (tab === 'contact') App.activeMainTab = 'contact';
                render();
            });
        });

        const excelInput = document.getElementById('excelUploadInput');
        const xmlInput = document.getElementById('xmlUploadInput');
        const excelStatusSpan = document.getElementById('excelStatusArea');
        const xmlStatusSpan = document.getElementById('xmlStatusArea');

        if (excelInput) {
            excelInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) { App.checklistIds = null; if(excelStatusSpan) excelStatusSpan.innerHTML = '<i class="far fa-trash-alt"></i> No file'; return; }
                if(excelStatusSpan) excelStatusSpan.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> parsing...';
                try {
                    const idsSet = await parseExcelToSet(file);
                    App.checklistIds = idsSet;
                    if(excelStatusSpan) excelStatusSpan.innerHTML = `<i class="fas fa-check-circle" style="color:#2A7A3E;"></i> ${idsSet.size} IDs loaded`;
                } catch(err) {
                    App.checklistIds = null;
                    if(excelStatusSpan) excelStatusSpan.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${err.message.slice(0,30)}`;
                }
            });
        }

        if (xmlInput) {
            xmlInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) { App.xmlFiles = []; if(xmlStatusSpan) xmlStatusSpan.innerHTML = '<i class="fas fa-database"></i> No XMLs'; return; }
                if(xmlStatusSpan) xmlStatusSpan.innerHTML = `<i class="fas fa-spinner"></i> processing ${files.length} XMLs...`;
                const parsed = await processXmlFiles(files);
                App.xmlFiles = parsed;
                const totalUnique = new Set(parsed.flatMap(p => p.ids)).size;
                if(xmlStatusSpan) xmlStatusSpan.innerHTML = `<i class="fas fa-file-code"></i> ${parsed.length} files | ${totalUnique} unique IDs`;
            });
        }

        const runBtn = document.getElementById('runReconAction');
        if (runBtn) {
            runBtn.addEventListener('click', () => {
                if (!App.checklistIds) {
                    showResultMessage("⚠️ Please upload Master Checklist (Excel) first.", true);
                    return;
                }
                if (!App.xmlFiles.length) {
                    showResultMessage("⚠️ Please upload at least one XML file.", true);
                    return;
                }
                performReconciliationLogic();
            });
        }
        const logoutDash = document.getElementById('logoutFromDash');
        if(logoutDash) logoutDash.addEventListener('click', () => { App.loggedIn = false; render(); });
    }

    function showResultMessage(msg, isErr) {
        const panel = document.getElementById('reconResultsPanel');
        if(panel) {
            panel.innerHTML = `<div style="background:#FFF7E5; border-left:5px solid #F0AD4E; border-radius:1rem; padding:1rem;"><i class="fas fa-info-circle"></i> ${escapeHtml(msg)}</div>`;
        }
    }

    function performReconciliationLogic() {
        const expectedSet = App.checklistIds;
        const actualMap = new Map(); // id -> sources array
        for (let xml of App.xmlFiles) {
            for (let id of xml.ids) {
                if (!actualMap.has(id)) actualMap.set(id, []);
                actualMap.get(id).push(xml.name);
            }
        }
        const actualSet = new Set(actualMap.keys());
        const matched = new Set([...expectedSet].filter(id => actualSet.has(id)));
        const missing = new Set([...expectedSet].filter(id => !actualSet.has(id)));
        const matchRate = (matched.size / expectedSet.size) * 100;
        const matchedRows = Array.from(matched).map(id => ({ id, sources: actualMap.get(id).join(', ') }));
        renderResultPanel(matchRate, matched.size, missing.size, matchedRows, Array.from(missing));
    }

    function renderResultPanel(rate, matchedCount, missingCount, matchedRows, missingArray) {
        const container = document.getElementById('reconResultsPanel');
        if (!container) return;
        const rateFixed = rate.toFixed(1);
        const html = `
            <div style="background:white; border-radius:1.4rem; overflow:hidden; border:1px solid #EEF3FA;">
                <div class="metric-row">
                    <div class="metric-modern"><div class="metric-value">${rateFixed}%</div><div>Match Rate</div></div>
                    <div class="metric-modern"><div class="metric-value">${matchedCount}</div><div>Matched IDs</div></div>
                    <div class="metric-modern"><div class="metric-value">${missingCount}</div><div>Missing</div></div>
                </div>
                <div style="padding:0 1rem 1rem 1rem;">
                    <div class="result-tab-group" id="resultTabGroup">
                        <button class="result-tab-btn active-result" data-result-tab="matchPanel">✓ Matched (${matchedCount})</button>
                        <button class="result-tab-btn" data-result-tab="missPanel">✗ Missing (${missingCount})</button>
                    </div>
                    <div id="matchPanelView">
                        ${matchedRows.length ? renderMatchedTable(matchedRows) : '<div style="padding:1rem; text-align:center;">No matches</div>'}
                    </div>
                    <div id="missPanelView" style="display:none;">
                        ${missingArray.length ? `<div style="background:#FEF5EA; padding:1rem; border-radius:1rem;"><strong>Missing IDs (${missingArray.length})</strong><div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;">${missingArray.map(id => `<span style="background:#EFF3F9; padding:4px 14px; border-radius:40px;font-size:0.8rem;">${escapeHtml(id)}</span>`).join('')}</div></div>` : '<div style="padding:1rem; color:#2E7D32;">✅ Perfect match! No missing IDs.</div>'}
                    </div>
                </div>
            </div>
        `;
        container.innerHTML = html;
        // attach tab listeners
        const matchBtn = document.querySelector('[data-result-tab="matchPanel"]');
        const missBtn = document.querySelector('[data-result-tab="missPanel"]');
        const matchDiv = document.getElementById('matchPanelView');
        const missDiv = document.getElementById('missPanelView');
        if (matchBtn && missBtn && matchDiv && missDiv) {
            matchBtn.addEventListener('click', () => {
                matchDiv.style.display = 'block';
                missDiv.style.display = 'none';
                matchBtn.classList.add('active-result');
                missBtn.classList.remove('active-result');
            });
            missBtn.addEventListener('click', () => {
                matchDiv.style.display = 'none';
                missDiv.style.display = 'block';
                missBtn.classList.add('active-result');
                matchBtn.classList.remove('active-result');
            });
        }
    }

    function renderMatchedTable(rows) {
        return `
            <div style="max-height:280px; overflow-y:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:0.75rem;">
                    <thead><tr style="background:#F3F8FE;"><th style="padding:8px; text-align:left;">ID</th><th style="padding:8px; text-align:left;">Source XML(s)</th></tr></thead>
                    <tbody>
                        ${rows.map(r => `<tr><td style="padding:8px; border-bottom:1px solid #ECF1F7;"><strong>${escapeHtml(r.id)}</strong></td><td style="padding:8px;">${escapeHtml(r.sources)}</td></tr>`).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    render();
</script>
</body>
</html>
